<!-- FastPay Connect PWA Icon -->
<!-- Автор: Dupley Maxim Igorevich -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#009688;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00796B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#grad1)"/>
  
  <!-- Card symbol -->
  <rect x="106" y="156" width="300" height="200" rx="20" fill="#ffffff" opacity="0.95"/>
  
  <!-- Card chip -->
  <rect x="146" y="196" width="50" height="40" rx="6" fill="#FFD700"/>
  
  <!-- Card lines -->
  <rect x="146" y="256" width="200" height="12" rx="6" fill="#E0E0E0"/>
  <rect x="146" y="280" width="150" height="12" rx="6" fill="#E0E0E0"/>
  
  <!-- FastPay text -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">FP</text>
</svg>
