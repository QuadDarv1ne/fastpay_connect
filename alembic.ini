[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# PostgreSQL для dev (через Docker)
# Для локальной разработки без Docker используйте SQLite
# sqlalchemy.url = sqlite:///./fastpay_connect.db
sqlalchemy.url = postgresql://fastpay_user:fastpay_pass@localhost:5432/fastpay_connect

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
