[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Database URL should be set via environment variable DATABASE_URL
# For local development without Docker use SQLite:
#   export DATABASE_URL=sqlite:///./fastpay_connect.db
# For production use PostgreSQL:
#   export DATABASE_URL=postgresql://user:pass@host:5432/dbname
sqlalchemy.url = sqlite:///./fastpay_connect.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
