# AWS Elastic Beanstalk Nginx Configuration
# Документация: https://docs.aws.amazon.com/elasticbeanstalk/latest/dg/command-options-general.html

files:
  "/etc/nginx/conf.d/01_fastpay.conf":
    mode: "000644"
    owner: root
    group: root
    content: |
      upstream fastpay_backend {
        server 127.0.0.1:8080;
      }
      
      server {
        listen 80;
        server_name _;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Static files
        location /static {
          alias /var/app/current/app/static;
          expires 30d;
          add_header Cache-Control "public, immutable";
        }
        
        # API endpoints
        location / {
          proxy_pass http://fastpay_backend;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
          proxy_read_timeout 90;
          proxy_connect_timeout 90;
          proxy_send_timeout 90;
        }
        
        # Health check endpoint
        location /health {
          proxy_pass http://fastpay_backend/health;
          access_log off;
        }
        
        # Rate limiting
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
        location /payments {
          limit_req zone=api_limit burst=20 nodelay;
          proxy_pass http://fastpay_backend/payments;
        }
        
        location /webhooks {
          limit_req zone=api_limit burst=50 nodelay;
          proxy_pass http://fastpay_backend/webhooks;
        }
      }
