# Kubernetes Deployment Configuration
# Использование: kubectl apply -f k8s/deployment.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: fastpay
  labels:
    name: fastpay
    environment: production

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fastpay-config
  namespace: fastpay
data:
  ENV: "production"
  LOG_LEVEL: "INFO"
  PORT: "8080"
  HOST: "0.0.0.0"
  DATABASE_URL: "postgresql://fastpay_user:password@fastpay-db:5432/fastpay_connect"
  ALLOWED_HOSTS: "localhost,127.0.0.1,fastpay.example.com"
  ALLOWED_ORIGINS: "https://fastpay.example.com"

---
apiVersion: v1
kind: Secret
metadata:
  name: fastpay-secrets
  namespace: fastpay
type: Opaque
stringData:
  SECRET_KEY: "change-me-in-production"
  YOOKASSA_API_KEY: "your_yookassa_api_key"
  YOOKASSA_SECRET_KEY: "your_yookassa_secret_key"
  TINKOFF_API_KEY: "your_tinkoff_api_key"
  TINKOFF_SECRET_KEY: "your_tinkoff_secret_key"
  CLOUDPAYMENTS_API_KEY: "your_cloudpayments_api_key"
  CLOUDPAYMENTS_SECRET_KEY: "your_cloudpayments_secret_key"
  UNITPAY_API_KEY: "your_unitpay_api_key"
  UNITPAY_SECRET_KEY: "your_unitpay_secret_key"
  ROBOKASSA_API_KEY: "your_robokassa_api_key"
  ROBOKASSA_SECRET_KEY: "your_robokassa_secret_key"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastpay-app
  namespace: fastpay
  labels:
    app: fastpay
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fastpay
  template:
    metadata:
      labels:
        app: fastpay
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: fastpay
          image: fastpay/fastpay-connect:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fastpay-config
            - secretRef:
                name: fastpay-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: fastpay
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: fastpay-service
  namespace: fastpay
  labels:
    app: fastpay
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: fastpay

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fastpay-hpa
  namespace: fastpay
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fastpay-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fastpay-ingress
  namespace: fastpay
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - fastpay.example.com
      secretName: fastpay-tls
  rules:
    - host: fastpay.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fastpay-service
                port:
                  number: 80
