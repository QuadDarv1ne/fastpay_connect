name: FastPay CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  release:
    types: [published]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==================== LINT & TEST ====================
  test:
    runs-on: ubuntu-latest
    name: "🧪 Test & Lint"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with flake8 (errors only)
        run: |
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check formatting with black
        run: |
          black --check app

      - name: Check imports with isort
        run: |
          isort --check-only app

      - name: Type check with mypy
        run: |
          mypy app --ignore-missing-imports --disable-error-code=annotation-unchecked || true

      - name: Test with pytest
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ==================== BUILD DOCKER ====================
  build:
    runs-on: ubuntu-latest
    needs: test
    name: "🐳 Build & Push Docker"
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== DEPLOY TO CLOUDFLARE ====================
  deploy-cloudflare:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    name: "☁️ Deploy to Cloudflare"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: deploy/cloudflare/package.json

      - name: Install dependencies
        working-directory: deploy/cloudflare
        run: npm ci

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: deploy/cloudflare
          environment: production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ==================== DEPLOY TO RENDER ====================
  deploy-render:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    name: "🎨 Deploy to Render"
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render Deploy
        run: |
          curl -X POST "https://api.render.com/deploy/srv-xxx" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"

  # ==================== DEPLOY TO RAILWAY ====================
  deploy-railway:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    name: "🚂 Deploy to Railway"
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: railwayapp/deploy-action@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          railway_project_id: ${{ secrets.RAILWAY_PROJECT_ID }}
          railway_environment: production

  # ==================== DEPLOY TO FLY.IO ====================
  deploy-flyio:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    name: "🪂 Deploy to Fly.io"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        working-directory: deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ==================== DEPLOY TO K8S ====================
  deploy-k8s:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    name: "☸️ Deploy to Kubernetes"
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Update image in deployment
        run: |
          kubectl set image deployment/fastpay-app \
            fastpay=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n fastpay
          kubectl apply -f deploy/k8s/deployment.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/fastpay-app -n fastpay --timeout=300s

  # ==================== DEPLOY TO VPS ====================
  deploy-vps:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    name: "🖥️ Deploy to VPS"
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /var/www/fastpay_connect
            git pull origin main
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --build
            docker system prune -f

  # ==================== NOTIFY ====================
  notify:
    runs-on: ubuntu-latest
    needs: [deploy-cloudflare, deploy-render, deploy-railway, deploy-flyio, deploy-k8s, deploy-vps]
    if: always()
    name: "📢 Notify"
    steps:
      - name: Send Telegram Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 FastPay Connect Deployment
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.commit_message }}
            Status: ${{ job.status }}
            URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 FastPay Connect Deployment\nBranch: ${{ github.ref_name }}\nStatus: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚀 *FastPay Connect Deployment*\nBranch: ${{ github.ref_name }}\nStatus: ${{ job.status }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
